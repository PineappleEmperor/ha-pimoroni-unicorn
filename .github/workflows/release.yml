name: Create Release ZIP

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    name: Create Release Asset
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create integration ZIP
        run: |
          cd custom_components/pimoroni_unicorn
          zip -r ../../pimoroni_unicorn.zip .
          cd ../..
          ls -la pimoroni_unicorn.zip

      - name: Create firmware ZIP
        run: |
          cd firmware
          # Ship a ready-to-edit secrets.py (from the template) so users don't rename.
          cp secrets.example.py secrets.py
          zip -r ../pimoroni_unicorn_firmware.zip . -x 'secrets.example.py'
          rm secrets.py
          cd ..
          ls -la pimoroni_unicorn_firmware.zip

      - name: Upload integration asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./pimoroni_unicorn.zip
          asset_name: pimoroni_unicorn.zip
          asset_content_type: application/zip

      - name: Upload firmware asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./pimoroni_unicorn_firmware.zip
          asset_name: pimoroni_unicorn_firmware.zip
          asset_content_type: application/zip