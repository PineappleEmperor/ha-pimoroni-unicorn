name: Python validation

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pyright homeassistant

      - name: Run ruff
        run: ruff check custom_components/

      - name: Run pyright
        run: pyright custom_components/

      - name: Check render/ is in sync with firmware/
        run: python scripts/check_render_sync.py

      - name: Check widget boxes match rendered output
        run: python scripts/check_widget_boxes.py

      - name: Check engine file manifest is complete
        run: python scripts/check_engine_manifest.py
