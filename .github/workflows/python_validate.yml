name: Python validation

on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pyright homeassistant
          pip install pytest pytest-cov pytest-homeassistant-custom-component home-assistant-frontend

      - name: Run ruff
        run: ruff check custom_components/

      - name: Run pyright
        run: pyright custom_components/

      # Coverage gate ratchets: the fail-under floor tracks measured coverage and only
      # ever goes up. Excludes tests/firmware (device stubs) + gate-script tests.
      - name: Integration tests + coverage gate
        run: >-
          python -m pytest
          tests/integration tests/test_render_service.py tests/test_first_frame_png.py
          tests/test_lametric.py tests/test_marketplace.py
          --cov=custom_components/pimoroni_unicorn --cov-fail-under=95 -q

      - name: Manifest gate unit tests
        run: python -m pytest tests/test_manifest_gate.py -q

      - name: Check render/ is in sync with firmware/
        run: python scripts/check_render_sync.py

      - name: Check widget boxes match rendered output
        run: python scripts/check_widget_boxes.py

      - name: Check engine file manifest is complete
        run: python scripts/check_engine_manifest.py
