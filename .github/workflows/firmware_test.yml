name: Firmware tests

on: [push, pull_request]

jobs:
  firmware:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.14"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mpy-cross pytest

      - name: Compile-gate every firmware module (mpy-cross, RP2040 / armv6m)
        run: |
          err=0
          while IFS= read -r f; do
            python -m mpy_cross -march=armv6m "$f" -o /tmp/out.mpy 2>/tmp/err || { echo "::error file=$f::mpy-cross failed"; cat /tmp/err; err=1; }
          done < <(find firmware -name '*.py')
          exit $err

      - name: Import + logic harness for the OTA-critical engine
        run: python -m pytest tests/firmware -q
