name: Create/Update Dev PR

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  create-or-update-pr:
    runs-on: ubuntu-latest
    outputs:
      pr_number: ${{ steps.pr.outputs.pr_number }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate PR body and title type from commits
        id: commits
        run: |
          BODY=$(git log origin/main..HEAD --pretty=format:"  - %s" --reverse)
          if [ -z "$BODY" ]; then
            BODY="  - (no commits ahead of main)"
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          SUBJECTS=$(git log origin/main..HEAD --pretty=format:"%s" --reverse)

          TITLE=$(echo "$SUBJECTS" | grep -iE "^feat(\(.+\))?!?:" | tail -1)
          if [ -z "$TITLE" ]; then
            TITLE=$(echo "$SUBJECTS" | grep -iE "^fix(\(.+\))?!?:" | tail -1)
          fi
          if [ -z "$TITLE" ]; then
            TITLE=$(echo "$SUBJECTS" | tail -1)
          fi
          TITLE=$(echo "$TITLE" | xargs)
          echo "title=$TITLE" >> $GITHUB_OUTPUT

      - name: Create or update draft PR
        id: pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: ${{ github.ref_name }}
          BODY: ${{ steps.commits.outputs.body }}
          TITLE: ${{ steps.commits.outputs.title }}
        run: |
          PR_NUMBER=$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number')
          if [ -z "$PR_NUMBER" ]; then
            gh pr create \
              --draft \
              --title "$TITLE" \
              --body "$BODY" \
              --base main \
              --head "$BRANCH"
            PR_NUMBER=$(gh pr list --head "$BRANCH" --base main --state open --json number --jq '.[0].number')
          else
            gh pr edit "$PR_NUMBER" --body "$BODY"
          fi
          echo "pr_number=$PR_NUMBER" >> $GITHUB_OUTPUT

      - name: Apply label from commit type
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TITLE: ${{ steps.commits.outputs.title }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          TYPE=$(echo "$TITLE" | grep -oiE '^(feat|fix|chore|docs)' | head -1 | tr '[:upper:]' '[:lower:]')
          case "$TYPE" in
            feat)       LABEL="feature" ;;
            fix)        LABEL="fix" ;;
            chore|docs) LABEL="chore" ;;
            *)          exit 0 ;;
          esac
          gh label create "$LABEL" --force 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --add-label "$LABEL"
