send_notification:
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: pimoroni_unicorn
    message:
      selector:
        text: {}
    icon:
      selector:
        select:
          custom_value: true
          options:
            - battery_full
            - battery_half
            - battery_low
            - battery_charging
            - solar
            - alert
            - home
            - lock
            - unlock
            - thermometer
            - sun
            - cloud
            - rain
            - check
    effect:
      selector:
        select:
          options:
            - rainbow
            - fire
            - matrix
            - scanner
            - comet
            - snow
            - confetti
            - flash
            - pulse
            - bounce
            - supercomputer
            - retroprompt
    sound:
      selector:
        select:
          options:
            - beep
            - chime
            - alert
    duration:
      selector:
        number:
          min: 1
          max: 60
          step: 0.5
          unit_of_measurement: s
    appearance:
      collapsed: true
      fields:
        color:
          selector:
            color_rgb: {}
        bg_color:
          selector:
            color_rgb: {}
        outlined:
          selector:
            boolean: {}
        entrance:
          selector:
            select:
              options:
                - none
                - slide_left
                - slide_right
                - center_out
                - fade
        scroll_speed:
          selector:
            number:
              min: 0.1
              max: 5
              step: 0.1
        effect_speed:
          selector:
            number:
              min: 0.1
              max: 5
              step: 0.1
    behaviour:
      collapsed: true
      fields:
        hold:
          selector:
            boolean: {}
        repeat:
          selector:
            number:
              min: 1
              max: 10
              step: 1
        stack:
          selector:
            boolean: {}
        wakeup:
          selector:
            boolean: {}

dismiss_notification:
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: pimoroni_unicorn
    all:
      selector:
        boolean: {}

push_firmware:
  fields:
    files:
      default:
        - main
      selector:
        select:
          multiple: true
          custom_value: true
          options:
            - main
            - drawing
            - notify_animations
            - icons
            - sounds
            - weather_fx
            - bitfonts
            - monospace_digits
            - monospace_big_digits
    file_content:
      selector:
        object: {}
