send_notification:
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: pimoroni_unicorn
    message:
      selector:
        text: {}
    icon:
      selector:
        text: {}
    icon_scale:
      selector:
        number:
          min: 1
          max: 4
          step: 1
          mode: slider
    icon_position:
      selector:
        select:
          options:
            - {value: left, label: Left}
            - {value: center, label: Center}
            - {value: right, label: Right}
    effect:
      selector:
        select:
          options:
            - {value: rainbow, label: Rainbow}
            - {value: fire, label: Fire}
            - {value: matrix, label: Matrix}
            - {value: scanner, label: Scanner}
            - {value: comet, label: Comet}
            - {value: snow, label: Snow}
            - {value: confetti, label: Confetti}
            - {value: flash, label: Flash}
            - {value: pulse, label: Pulse}
            - {value: bounce, label: Bounce}
            - {value: supercomputer, label: Supercomputer}
            - {value: retroprompt, label: Retro prompt}
    sound:
      selector:
        select:
          options:
            - {value: beep, label: Beep}
            - {value: chime, label: Chime}
            - {value: alert, label: Alert}
    duration:
      selector:
        number:
          min: 1
          max: 60
          step: 0.5
          unit_of_measurement: s
    appearance:
      collapsed: true
      fields:
        color:
          selector:
            color_rgb: {}
        bg_color:
          selector:
            color_rgb: {}
        outlined:
          selector:
            boolean: {}
        entrance:
          selector:
            select:
              options:
                - {value: "none", label: "None"}
                - {value: swipe_left, label: Swipe from left}
                - {value: swipe_right, label: Swipe from right}
                - {value: slide_left, label: Slide in from left}
                - {value: slide_right, label: Slide in from right}
                - {value: center_out, label: Center out}
                - {value: fade, label: Fade in}
        scroll_speed:
          selector:
            number:
              min: 0.1
              max: 5
              step: 0.1
        effect_speed:
          selector:
            number:
              min: 0.1
              max: 5
              step: 0.1
    behaviour:
      collapsed: true
      fields:
        hold:
          selector:
            boolean: {}
        repeat:
          selector:
            number:
              min: 1
              max: 10
              step: 1
        stack:
          selector:
            boolean: {}
        wakeup:
          selector:
            boolean: {}

dismiss_notification:
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: pimoroni_unicorn
    all:
      selector:
        boolean: {}

push_firmware:
  fields:
    device_id:
      selector:
        device:
          integration: pimoroni_unicorn
    files:
      default:
        - main
      selector:
        select:
          multiple: true
          custom_value: true
          options:
            - main
            - drawing
            - notify_animations
            - icons
            - sounds
            - weather_fx
            - bitfonts
            - monospace_digits
            - monospace_big_digits
    file_content:
      selector:
        object: {}

show_page:
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: pimoroni_unicorn
    index:
      selector:
        number:
          min: 0
          max: 32
          mode: box
    name:
      selector:
        text: {}
    clear:
      selector:
        boolean: {}

set_playlist:
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: pimoroni_unicorn
    pages:
      required: true
      selector:
        text:
          multiple: true
    dwell:
      selector:
        number:
          min: 1
          max: 600
          mode: box
    transition:
      selector:
        select:
          options:
            - none
            - fade
