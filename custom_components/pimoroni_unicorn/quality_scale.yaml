# Tracking toward the HA integration quality scale. Honest current state — drives rc2+ work.
rules:
  # Bronze
  action-setup: done
  appropriate-polling:
    status: exempt
    comment: Local push over MQTT; no polling.
  brands: done
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure:
    status: exempt
    comment: >-
      The flow creates an entry from device id + model with no synchronous device/broker
      connection to validate; devices announce themselves via MQTT discovery. Nothing to test.
  test-before-setup: done
  unique-config-entry: done
  # Silver
  config-entry-unloading: done
  log-when-unavailable: done
  entity-unavailable: done
  action-exceptions: done
  reauthentication-flow:
    status: exempt
    comment: No authentication to the device beyond MQTT broker creds (HA-managed).
  parallel-updates: done
  test-coverage:
    status: done
    comment: >-
      Suite covers config/options flows, setup+unload, MQTT message handlers, services, the
      websocket API, render_service, lametric (incl. SSRF), marketplace, update, and repair
      problems. A pytest-cov gate (--cov-fail-under=95) in python_validate.yml enforces it.
  integration-owner: done
  docs-installation-parameters: done
  docs-configuration-parameters: done
  # Gold
  entity-translations: done
  entity-device-class: done
  devices: done
  entity-category: done
  entity-disabled-by-default: done
  discovery: done
  stale-devices: done
  diagnostics: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow: done
  dynamic-devices:
    status: exempt
    comment: One device per config entry; not a hub.
  discovery-update-info:
    status: exempt
    comment: MQTT transport keyed on device_id; no network host/IP to refresh on rediscovery.
  repair-issues: done
  docs-use-cases: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-data-update: done
  docs-known-limitations: done
  docs-troubleshooting: done
  docs-examples: done
  # Platinum
  async-dependency:
    status: exempt
    comment: Only dependency is Pillow (image encoding), run in the executor.
  inject-websession:
    status: done
    comment: LaMetric icon fetch uses async_get_clientsession; OTA pulls run device-side.
  strict-typing:
    status: done
    comment: pyrightconfig.json is typeCheckingMode=strict; pyright passes clean in CI.
