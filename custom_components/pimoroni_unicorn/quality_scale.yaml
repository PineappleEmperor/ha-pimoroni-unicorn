# Tracking toward the HA integration quality scale. Honest current state — drives rc2+ work.
rules:
  # Bronze
  action-setup: done
  appropriate-polling:
    status: exempt
    comment: Local push over MQTT; no polling.
  brands: done
  common-modules:
    status: todo
    comment: No coordinator (push); audit module layout.
  config-flow-test-coverage:
    status: todo
    comment: No tests yet.
  config-flow: done
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup: done
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure:
    status: todo
    comment: Config flow does not yet test the MQTT/device connection.
  test-before-setup:
    status: todo
    comment: Raise ConfigEntryNotReady when the device/broker is unavailable.
  unique-config-entry: done
  # Silver
  config-entry-unloading: done
  log-when-unavailable:
    status: todo
  entity-unavailable: done
  action-exceptions:
    status: todo
  reauthentication-flow:
    status: exempt
    comment: No authentication to the device beyond MQTT broker creds (HA-managed).
  parallel-updates: done
  test-coverage:
    status: todo
    comment: No test suite yet.
  integration-owner: done
  docs-installation-parameters: done
  docs-configuration-parameters: done
  # Gold
  entity-translations:
    status: todo
  entity-device-class:
    status: todo
  devices: done
  entity-category:
    status: todo
    comment: Diagnostic entities pending (#63).
  entity-disabled-by-default:
    status: todo
    comment: Diagnostic sensors disabled-by-default pending (#63).
  discovery: done
  stale-devices: done
  diagnostics: done
  exception-translations:
    status: todo
  icon-translations:
    status: todo
  reconfiguration-flow:
    status: todo
    comment: Options flow exists; add a dedicated reconfigure step.
  dynamic-devices:
    status: exempt
    comment: One device per config entry; not a hub.
  discovery-update-info:
    status: exempt
    comment: MQTT transport keyed on device_id; no network host/IP to refresh on rediscovery.
  repair-issues:
    status: todo
  docs-use-cases: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-data-update: done
  docs-known-limitations: done
  docs-troubleshooting: done
  docs-examples: done
  # Platinum
  async-dependency:
    status: exempt
    comment: Only dependency is Pillow (image encoding), run in the executor.
  inject-websession:
    status: done
    comment: LaMetric icon fetch uses async_get_clientsession; OTA pulls run device-side.
  strict-typing:
    status: todo
    comment: pyright standard passes; not strict mode yet.
